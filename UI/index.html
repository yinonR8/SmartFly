<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartFly</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0e1118; color: #fff; font-family: 'Space Grotesk', sans-serif; padding: 24px; }
        :root { --cyan: #00f5c4; --panel: #141920; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 22px; font-weight: 700; }
        .logo span { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--cyan); letter-spacing: 2px; margin-left: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .controls label { font-size: 12px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.5); }
        input[type=number] { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,245,196,0.3); color: #fff; border-radius: 8px; padding: 8px 12px; font-family: 'Space Mono', monospace; font-size: 14px; width: 70px; text-align: center; outline: none; }
        button { background: rgba(0,245,196,0.08); color: var(--cyan); border: 1px solid rgba(0,245,196,0.3); padding: 9px 18px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Space Grotesk', sans-serif; letter-spacing: 1px; }
        button:hover { background: rgba(0,245,196,0.15); }

        /* Panels */
        .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px; }
        .panel-title { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        .panel-title::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; }

        /* Flight Cards */
        .flights-scroll { max-height: 360px; overflow-y: auto; padding-right: 4px; }
        .flights-scroll::-webkit-scrollbar { width: 3px; }
        .flights-scroll::-webkit-scrollbar-thumb { background: rgba(0,245,196,0.25); border-radius: 2px; }
        .flight-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .flight-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .flight-card p { font-size: 11px; color: rgba(255,255,255,0.45); font-family: 'Space Mono', monospace; }
        .match-score { font-size: 20px; font-weight: 700; color: var(--cyan); font-family: 'Space Mono', monospace; margin-left: auto; flex-shrink: 0; }

        /* Vector Bars — all cyan */
        .bar-wrap { margin-bottom: 7px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 11px; font-family: 'Space Mono', monospace; color: rgba(255,255,255,0.45); margin-bottom: 3px; }
        .bar-track { height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; background: var(--cyan); }

        /* Metrics */
        .grid-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .metric-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 10px; text-align: center; }
        .metric-number { font-size: 32px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--cyan); margin: 8px 0 4px; }
        .metric-label { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; }
        .metric-sub { font-size: 10px; color: rgba(255,255,255,0.25); font-family: 'Space Mono', monospace; margin-top: 4px; }

        .empty-state { color: rgba(255,255,255,0.3); font-family: 'Space Mono', monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">SmartFly <span>LIVE DASHBOARD</span></div>
    <div class="controls">
        <label>Results (K):</label>
        <input type="number" id="k-input" value="5" min="1" max="50">
        <button onclick="runSimulation()">↻ NEW SIMULATION</button>
    </div>
</div>

<div class="grid-top">
    <div class="panel">
        <div class="panel-title" id="flights-title">Top Recommended Flights</div>
        <div class="flights-scroll" id="flights-list">
            <div class="empty-state">No data yet — press NEW SIMULATION to start.</div>
        </div>
    </div>
    <div class="panel">
        <div class="panel-title">User Preference Vector</div>
        <div id="vector-container">
            <div class="empty-state">No data yet.</div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="panel-title">Algorithmic Performance</div>
    <div class="grid-bottom">
        <div class="metric-box">
            <div class="metric-label">Total Flights</div>
            <div class="metric-number" id="total-flights">—</div>
            <div class="metric-sub">in database</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Pruning Efficiency</div>
            <div class="metric-number" id="pruning-pct">—</div>
            <div class="metric-sub">Visited: <span id="visited-count">—</span> nodes</div>
        </div>
    </div>
</div>

<script>
    const DIM_NAMES = ["Price","Duration","Depart Time","Connections","Airline Rating","Urban","Nature","Beach","History"];

    async function runSimulation() {
        const k = parseInt(document.getElementById('k-input').value) || 5;
        document.getElementById('flights-title').textContent = 'Top ' + k + ' Recommended Flights';

        const response = await fetch('http://localhost:8080/api/simulate?k=' + k);
        const data = await response.json();

        renderMetrics(data);
        renderVector(data.userVector);
        renderFlights(data.flights);
    }

    function renderMetrics(data) {
        const pruned = data.totalFlights - data.visitedNodes;
        const pct = ((pruned / data.totalFlights) * 100).toFixed(1);
        document.getElementById('total-flights').textContent = data.totalFlights.toLocaleString();
        document.getElementById('pruning-pct').textContent = pct + '%';
        document.getElementById('visited-count').textContent = data.visitedNodes.toLocaleString();
    }

    function renderVector(userVector) {
        const html = userVector.map(function(val, i) {
            return "<div class='bar-wrap'>"
                 + "<div class='bar-label'><span>" + DIM_NAMES[i] + "</span><span>" + val.toFixed(2) + "</span></div>"
                 + "<div class='bar-track'><div class='bar-fill' style='width:" + (val * 100) + "%'></div></div>"
                 + "</div>";
        }).join('');
        document.getElementById('vector-container').innerHTML = html;
    }

    function renderFlights(flights) {
        const html = flights.map(function(f) {
            return "<div class='flight-card'>"
                 + "<div style='font-size:22px;flex-shrink:0'>✈</div>"
                 + "<div><h3>" + f.airline + " &rarr; " + f.destination + "</h3>"
                 + "<p>" + f.description + "</p></div>"
                 + "<div class='match-score'>" + f.matchScore + "%</div>"
                 + "</div>";
        }).join('');
        document.getElementById('flights-list').innerHTML = html;
    }
</script>
</body>
</html>
